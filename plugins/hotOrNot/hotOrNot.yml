name: HotOrNot
description: Adds an ELO based ranking system for performers and images
version: 2.1.0
url: https://github.com/lowgrade12/hot-or-not
ui:
  javascript:
    - hotOrNot.js
  css:
    - hotOrNot.css
  csp:
    connect-src:
      - https://stashdb.org/graphql
      - https://theporndb.net/graphql
      - https://fansdb.cc/graphql
      - https://fansdb.xyz/graphql
settings:
  showBattleRankBadge:
    displayName: Show Battle Rank Badge
    description: Show a rank badge on individual performer pages. Enabled by default.
    type: BOOLEAN
  showStarRatingWidget:
    displayName: Show Star Rating Widget
    description: Show a star rating widget on performer cards. Enabled by default.
    type: BOOLEAN
  battleCardTiers:
    displayName: Battle Card Tier Mapping
    description: "Optional rating tier mapping for battle cards. Format: r_<thresholds>_<tiers>. Example: r_10/8.5/7/5.5/4/2.5/0_gold/hot/default/#7f1e82/#14bbe0/#92e014/#808080"
    type: STRING
