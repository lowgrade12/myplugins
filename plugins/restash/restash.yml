name: Restash
description: Computes a freshness score for scenes and performers into custom fields.
version: 0.3.0
url: https://github.com/lowgrade12/myplugins
exec:
  - python
  - "{pluginDir}/restash.py"
interface: raw
settings:
  tasteHalfLifeDays:    { displayName: Taste half-life (days), type: NUMBER, description: "How fast older watch events fade when building taste. Leave blank for the default (90)." }
  cooldownDays:         { displayName: Cooldown period (days), type: NUMBER, description: "Post-watch suppression window before rediscovery begins. Leave blank for the default (21)." }
  freshWeight:          { displayName: Freshness strength, type: NUMBER, description: "Multiplier on the cooldown/rediscovery effect. Leave blank for the default (1.0)." }
  wildcardPercent:      { displayName: Wildcard %, type: NUMBER, description: "Share of the library promoted as low-confidence wildcards each day. Leave blank for the default (2.0)." }
  respectManualRatings: { displayName: Blend manual ratings as a taste prior, type: BOOLEAN, description: "If on, a performer's manual rating100 nudges their affinity (read-only). Default off." }
  excludeTagName:       { displayName: Exclusion tag name, type: STRING, description: "Entities carrying this tag are dropped from scoring. Leave blank for the default ([Restash: Exclude])." }
  mirrorToRating100:    { displayName: "Also mirror score to rating100 (destructive)", type: BOOLEAN, description: "If on, each entity's Restash score is ALSO written to native rating100 (enables the in-app 'Rating, descending' sort). OVERWRITES manual ratings; a backup is auto-created first and can be reverted with 'Restore Ratings'. Default off." }
  disablePluginsBeforeRun: { displayName: "Disable other plugins before run", type: BOOLEAN, description: "If on, all other enabled plugins will be disabled before Restash runs, then re-enabled after. Prevents interference from other plugins during scoring. Default off." }
hooks:
  - name: on_scene_update
    description: Score a scene automatically when it is updated (e.g. organized).
    triggeredBy:
      - Scene.Update.Post
  - name: on_performer_create
    description: Score a newly created performer automatically.
    triggeredBy:
      - Performer.Create.Post
tasks:
  - name: Dry Run Report
    description: Full compute, writes nothing, logs top-30 scenes/performers with score breakdowns. Run this first.
    defaultArgs: { mode: dry }
  - name: Recompute All
    description: Read everything, rebuild the taste model, and write freshness scores to scenes + performers (custom_fields). Skips unchanged.
    defaultArgs: { mode: full }
  - name: Quick Refresh
    description: Fast daily re-score from the cached taste model — re-applies freshness, novelty, jitter, and wildcards without rebuilding affinities. Run Recompute All at least once first (Quick Refresh self-heals to a full run if no cache exists).
    defaultArgs: { mode: refresh }
  - name: Clear Restash Data
    description: Remove all Restash custom fields (restash_*) from scenes + performers. Other fields and ratings are left untouched.
    defaultArgs: { mode: clear }
  - name: Backup Ratings
    description: Snapshot every scene/performer's current native rating100 to a file in the plugin folder. Run before enabling the rating100 mirror; keeps timestamped history.
    defaultArgs: { mode: backup-ratings }
  - name: Restore Ratings
    description: Write the backed-up native rating100 values back from the file, reverting the library to the exact backup snapshot (undoes a rating100 mirror).
    defaultArgs: { mode: restore-ratings }
  - name: Disable Other Plugins
    description: Temporarily disable all other enabled plugins. They will be re-enabled when any Restash scoring task completes (if the setting is on).
    defaultArgs: { mode: disable-plugins }
  - name: Restore Plugins
    description: Re-enable plugins that were left disabled by a canceled or crashed Restash run. Safe to run anytime — does nothing if no plugins are stuck disabled.
    defaultArgs: { mode: restore-plugins }