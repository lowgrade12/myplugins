name: ReStash Filter
description: Displays scenes sorted by restash_score custom field, with component breakdowns. Uses the GraphQL API to work around the broken custom-field filter.
version: 1.0.0
url: https://github.com/lowgrade12/myplugins
ui:
  javascript:
    - reStashFilter.js
  css:
    - reStashFilter.css
settings:
  pageSize:
    displayName: Scenes per page
    description: How many scenes to fetch per GraphQL request. Lower values are faster but require more requests to load all scored scenes.
    type: NUMBER
  minScore:
    displayName: Minimum score filter
    description: Only show scenes with a restash_score at or above this value (0-100). Leave 0 to show all scored scenes.
    type: NUMBER
  cacheTtlMin:
    displayName: Cache TTL (minutes)
    description: How long to reuse the locally-cached scene list before re-fetching from Stash. Set to 0 to disable caching (always fetch fresh). Default is 60 minutes.
    type: NUMBER
