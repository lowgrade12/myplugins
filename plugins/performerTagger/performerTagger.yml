name: PerformerTagger
description: Injects a quick-tag panel on performer detail pages for one-click attribute tagging (hair color, body type, bust size, ethnicity, age range). Also provides a server-side batch task that auto-tags all performers from Stash's Task Queue.
version: 1.6.0
url: https://github.com/lowgrade12/myplugins
ui:
  javascript:
    - performerTagger.js
  css:
    - performerTagger.css
settings:
  enabled:
    displayName: Enable Performer Tagger
    description: Show the quick-tag panel on performer detail pages. Enabled by default.
    type: BOOLEAN
  collapsed:
    displayName: Start Collapsed
    description: Start the quick-tag panel in a collapsed state. Disabled by default.
    type: BOOLEAN

# Server-side Python backend (used for the Batch Tag task)
exec:
  - python
  - "{pluginDir}/performerTagger.py"
interface: raw

# Task visible in Stash → System → Tasks
tasks:
  - name: Batch Tag Performers
    description: >
      Scan all performers and auto-apply attribute tags (hair colour, ethnicity,
      age range, body type, bust) from their Stash data fields.
      Only applies tags in categories that have no existing tags set.
    defaultArgs:
      mode: batch_tag
  - name: Batch Tag Performers (Missing Only)
    description: >
      Same as "Batch Tag Performers" but skips any performer that already has
      at least one managed tag — only processes performers with no attribute
      tags at all.
    defaultArgs:
      mode: batch_tag
      skip_tagged: true
  - name: Batch Tag from Scenes
    description: >
      For each performer, scan all their scene tags and apply any that match known
      body-description categories (hair colour, ethnicity, body type, bust, etc.).
      Only fills categories where the performer has no existing managed tag.
      Uses majority vote across scenes — a tag must appear in at least 25% of scenes
      (minimum 2) when the performer has 4 or more scenes.
    defaultArgs:
      mode: batch_tag_from_scenes
  - name: Batch Tag from Scenes (Missing Only)
    description: >
      Same as "Batch Tag from Scenes" but skips any performer that already has
      at least one managed tag — only processes performers with no attribute
      tags at all.
    defaultArgs:
      mode: batch_tag_from_scenes
      skip_tagged: true
  - name: Remove All Performer Tags
    description: >
      Remove ALL tags from every performer, including any unrecognised leftover
      tags, so the Batch Tag task can re-apply correct ones from a clean slate.
    defaultArgs:
      mode: remove_all_tags
